# ==========================================
# 小灶私廚 (NEW_JWKL_CUISINE) 後端配置
# ==========================================

spring.application.name=cuisine-backend

# 1. 雲端資料庫 Supabase PostgreSQL 連線設定 (採用環境變數，防止密碼洩漏)
# JDBC URL 格式範例: jdbc:postgresql://db.xxxx.supabase.co:5432/postgres
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres?prepareThreshold=0}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. JPA & Hibernate 配置
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. 伺服器配置
server.port=${PORT:8080}
spring.profiles.active=local

# 4. 安全配置與全域環境變數
# API 安全校驗 Key (Header 中必須攜帶 X-API-KEY 且吻合此值)
security.api-key=${API_KEY:JWKL_CUISINE_DEFAULT_SECRET_API_KEY}

# 5. 跨來源 CORS 設定 (允許前端的網域，開發時預設設為 *)
cors.allowed-origins=${FRONTEND_URL:*}

# 6. Email 寄信服務設定 (使用 Gmail SMTP，採用環境變數，防止敏感資訊洩漏)
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME:example@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# 7. 第三方通知推播服務 (請由環境變數注入，切勿將真實金鑰填入此設定檔)
line.notify.token=${LINE_NOTIFY_TOKEN:}
line.bot.channel-token=${LINE_BOT_CHANNEL_TOKEN:}
line.bot.admin-user-id=${LINE_BOT_ADMIN_USER_ID:}
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
telegram.chat.id=${TELEGRAM_CHAT_ID:}

# 8. 效能優化 (縮短 Cloud Run 冷啟動時間)
spring.main.lazy-initialization=true

